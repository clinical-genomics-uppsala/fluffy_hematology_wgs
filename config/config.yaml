    - "alignment_summary_metrics"
    - "base_distribution_by_cycle_metrics"
    - "base_distribution_by_cycle.pdf"
    - "insert_size_metrics"
    - "insert_size_histogram.pdf"
    - "quality_by_cycle_metrics"
    - "quality_by_cycle.pdf"
    - "quality_distribution_metrics"
    - "quality_distribution.pdf"

picard_collect_wgs_metrics:
  container: "{{HYDRAGENETICS_PREFIX}}/picard{{CONTAINER_SUFFIX}}2.25.0{{CONTAINER_EXT}}"

pindel_update_vcf_sequence_dictionary:
  container: "{{HYDRAGENETICS_PREFIX}}/picard{{CONTAINER_SUFFIX}}2.25.0{{CONTAINER_EXT}}"

pindel_call:
  include_bed: "{{ref_pindel_include_bed}}"
  container: "{{HYDRAGENETICS_PREFIX}}/pindel{{CONTAINER_SUFFIX}}0.2.5b9{{CONTAINER_EXT}}"

pindel2vcf:
  container: "{{HYDRAGENETICS_PREFIX}}/pindel{{CONTAINER_SUFFIX}}0.2.5b9{{CONTAINER_EXT}}"
  extra: "-is 5 -he 0.01 -e 3"

rseqc_gene_body_coverage:
