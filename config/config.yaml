  method: "wgs"
  normal_reference: "{{ref_cnvkit_pon}}"
  extra: "--drop-low-coverage "

cnvkit_call:
  container: "{{HYDRAGENETICS_PREFIX}}/cnvkit{{CONTAINER_SUFFIX}}0.9.9{{CONTAINER_EXT}}"

cnvkit_diagram:
  container: "{{HYDRAGENETICS_PREFIX}}/cnvkit{{CONTAINER_SUFFIX}}0.9.9{{CONTAINER_EXT}}"

cnv_html_report:
  show_table: true
  template_dir: "{{FLUFFY_HOME}}/config/cnv_report_template"
  cnv_vcf:
    - annotation: cna_exons
      filter: cnv_hardfilter
  cytobands: True
  wide_plot_width: 2500

cnvkit_scatter:
  container: "{{HYDRAGENETICS_PREFIX}}/cnvkit{{CONTAINER_SUFFIX}}0.9.9{{CONTAINER_EXT}}"
  extra: "-c {locus} --y-min -5 --y-max 5"
  cna:
    "chr4": "DUX4"
    "chr5": "EBF1"
    "chr7": "IKZF1"
    "chr9": "CDKN2A,CDKN2B,PAX5"
    "chr11": "KMT2A"
    "chr12": "BTG1,ETV6,ZNF384"
    "chr13": "RB1"
    "chr17": "TP53"
    "chr21": "ERG,RUNX1"
    "chrX": "CRLF2,CSF2RA,IL3RA,P2RY8"

cnvkit_scatter_whole:
  container: "{{HYDRAGENETICS_PREFIX}}/cnvkit{{CONTAINER_SUFFIX}}0.9.9{{CONTAINER_EXT}}"
  extra: "--y-min -5 --y-max 5"

cnvkit_table:
  bedfile: "{{ref_cnvkit_table_bed}}"
  cyto_coordinates: "{{ref_cnvkit_table_cyto}}"

crumble:
  container: "{{HYDRAGENETICS_PREFIX}}/crumble{{CONTAINER_SUFFIX}}0.8.3{{CONTAINER_EXT}}"
