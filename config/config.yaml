star:
  container: "{{HYDRAGENETICS_PREFIX}}/star{{CONTAINER_SUFFIX}}2.7.10a{{CONTAINER_EXT}}"
  genome_index: "{{ref_star_index}}"
  extra: "--quantMode GeneCounts --sjdbGTFfile {{ref_arriba_gtf}} --outSAMtype BAM SortedByCoordinate --chimSegmentMin 10 --chimOutType WithinBAM SoftClip --chimJunctionOverhangMin 10 --chimScoreMin 1 --chimScoreDropMax 30 --chimScoreJunctionNonGTAG 0 --chimScoreSeparation 1 --alignSJstitchMismatchNmax 5 -1 5 5 --chimSegmentReadGapMax 3"

star_fusion:
  container: "{{TRINITYCTAT_PREFIX}}/starfusion{{CONTAINER_SUFFIX}}1.15.1{{CONTAINER_EXT}}"
  extra: "--examine_coding_effect"
  genome_path: "{{ref_star_fusion_path}}"

svdb_merge:
  tc_method:
    - name: pathology
      cnv_caller:
        - cnvkit
        - gatk
  container: "{{HYDRAGENETICS_PREFIX}}/svdb{{CONTAINER_SUFFIX}}2.6.0{{CONTAINER_EXT}}"

